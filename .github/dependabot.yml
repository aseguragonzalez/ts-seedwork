version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: '@commitlint/config-conventional'
    target-branch: main

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
