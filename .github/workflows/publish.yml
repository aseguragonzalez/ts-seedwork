name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml
    permissions:
      contents: read

  publish:
    name: Build and publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@aseguragonzalez'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
