name: Bug report
description: Report a bug in @aseguragonzalez/ts-seedwork
title: '[Bug]: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below so we can investigate quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet that reproduces the issue.
      placeholder: |
        1. Create a command handler that...
        2. Dispatch via CommandBus...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: '0.0.7'
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: '22.x'
    validations:
      required: true

  - type: input
    id: typescript
    attributes:
      label: TypeScript version
      placeholder: '6.x'
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, code snippets, or a reproduction repository.
